name: cd

on:
  push:
    branches: [main]

env:
  REGISTRY: git.alextldr.com
  IMAGE: stuttgart-gophers/stuttgartgophers

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: docker
    container:
      image: docker:git
    env:
      DOCKER_HOST: tcp://localhost:2375
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 \
            http://x-token-auth:${{ secrets.DEPLOYMENT_TOKEN }}@forgejo-http.forgejo.svc.cluster.local:3000/${{ github.repository }}.git \
            ${{ github.workspace }}

      - name: Login to Forgejo registry
        run: |
          echo "${{ secrets.DEPLOYMENT_TOKEN }}" | \
            docker login ${{ env.REGISTRY }} -u AlexTLDR --password-stdin

      - name: Build and push
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE }}:main \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE }}:sha-${{ github.sha }} .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE }}:main
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE }}:sha-${{ github.sha }}

      - name: Deploy to K3s
        run: |
          apk add --no-cache curl
          curl -LO "https://dl.k8s.io/release/$(curl -Ls \
            https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && mv kubectl /usr/local/bin/kubectl
          kubectl set image deployment/stuttgart-gophers \
            stuttgart-gophers=${{ env.REGISTRY }}/${{ env.IMAGE }}:sha-${{ github.sha }} \
            -n stuttgart-gophers
          kubectl rollout status deployment/stuttgart-gophers -n stuttgart-gophers